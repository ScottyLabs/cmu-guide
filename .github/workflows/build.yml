name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    name: Deno validation (${{ matrix.os }}, ${{ matrix.deno }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        deno: ["2.9.0", "v2.x"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno }}

      - name: Check Astro diagnostics
        run: deno task check

      - name: Smoke-test the development server
        shell: bash
        run: |
          deno task dev --host 127.0.0.1 --port 4321 > /tmp/cmu-guide-dev.log 2>&1 &
          dev_pid=$!
          trap 'kill "$dev_pid" 2>/dev/null || true' EXIT
          ready=0
          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:4321/ -o /tmp/cmu-guide-home.html; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            cat /tmp/cmu-guide-dev.log
            exit 1
          fi
          test -s /tmp/cmu-guide-home.html
          grep -F '<title>Home</title>' /tmp/cmu-guide-home.html

      - name: Build and verify search artifacts
        run: |
          deno task build
          test -f dist/index.html
          test -f dist/pagefind/pagefind.js
          test -f dist/pagefind/pagefind-entry.json

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install, build, and upload site
        uses: withastro/action@v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
